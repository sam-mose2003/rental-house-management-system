<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tenant Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Simple Tenant Creation Test</h1>
    
    <button onclick="createTenant()">Create Test Tenant</button>
    <button onclick="checkHouses()">Check Available Houses</button>
    <button onclick="checkBackend()">Check Backend Status</button>
    
    <div id="result"></div>

    <script>
        async function createTenant() {
            const result = document.getElementById('result');
            result.innerHTML = 'Creating tenant...';
            
            try {
                console.log('Starting tenant creation...');
                
                const response = await fetch('http://localhost:5000/api/tenants', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        national_id: '123456789',
                        phone: '0712345678',
                        email: 'test@example.com',
                        house_number: 'A101',
                        move_in_date: '2026-03-15'
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    result.innerHTML = `<div class="result success">✅ SUCCESS: Tenant created with ID ${data.tenant?.id}</div>`;
                } else {
                    result.innerHTML = `<div class="result error">❌ ERROR: ${data.error || 'Failed to create tenant'}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `<div class="result error">❌ CATCH ERROR: ${error.message}</div>`;
            }
        }

        async function checkHouses() {
            const result = document.getElementById('result');
            result.innerHTML = 'Checking houses...';
            
            try {
                const response = await fetch('http://localhost:5000/api/houses?vacant=1');
                const data = await response.json();
                result.innerHTML = `<div class="result success">✅ Found ${data.length} vacant houses</div>`;
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }

        async function checkBackend() {
            const result = document.getElementById('result');
            result.innerHTML = 'Checking backend...';
            
            try {
                const response = await fetch('http://localhost:5000/api/dashboard-stats');
                const data = await response.json();
                result.innerHTML = `<div class="result success">✅ Backend responding: ${JSON.stringify(data)}</div>`;
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Backend error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
