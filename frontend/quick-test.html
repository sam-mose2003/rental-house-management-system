<!DOCTYPE html>
<html>
<head>
    <title>Quick Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { background: white; padding: 20px; border-radius: 8px; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { background: #d4edda; color: green; }
        .error { background: #f8d7da; color: red; }
    </style>
</head>
<body>
    <h1>Quick Tenant Login Test</h1>
    
    <div class="test">
        <h3>Test Login with Approved Tenant</h3>
        <input type="email" id="email" placeholder="Email" value="jane.smith@email.com" style="width: 200px; padding: 5px;">
        <input type="text" id="password" placeholder="National ID" value="23456789" style="width: 150px; padding: 5px;">
        <button onclick="testLogin()">Test Login</button>
        <div id="result"></div>
    </div>
    
    <div class="test">
        <button onclick="checkTenants()">Check Approved Tenants</button>
        <div id="tenants"></div>
    </div>

    <script>
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:5000/api/tenant-login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await response.json();
                const resultDiv = document.getElementById('result');
                
                if (response.ok) {
                    resultDiv.className = 'test success';
                    resultDiv.innerHTML = `
                        <h4>✅ Login Success!</h4>
                        <p>Name: ${data.tenant.name}</p>
                        <p>House: ${data.tenant.house_number}</p>
                        <p>Email: ${data.tenant.email}</p>
                        <button onclick="goToDashboard()">Go to Dashboard</button>
                    `;
                    
                    // Store for dashboard test
                    localStorage.setItem('tenantInfo', JSON.stringify(data.tenant));
                    localStorage.setItem('tenantToken', data.token);
                } else {
                    resultDiv.className = 'test error';
                    resultDiv.innerHTML = `<h4>❌ Login Failed</h4><p>${data.error}</p>`;
                }
            } catch (error) {
                document.getElementById('result').className = 'test error';
                document.getElementById('result').innerHTML = `<h4>❌ Network Error</h4><p>${error.message}</p>`;
            }
        }
        
        async function checkTenants() {
            try {
                const response = await fetch('http://localhost:5000/api/tenants');
                const tenants = await response.json();
                const approved = tenants.filter(t => t.status === 'approved');
                
                const tenantsDiv = document.getElementById('tenants');
                tenantsDiv.innerHTML = `<h4>Approved Tenants (${approved.length}):</h4>`;
                
                approved.forEach(t => {
                    tenantsDiv.innerHTML += `
                        <div style="border: 1px solid #ddd; padding: 10px; margin: 5px;">
                            <p><strong>${t.name}</strong> - ${t.email}</p>
                            <p>House: ${t.house_number} | National ID: ${t.national_id}</p>
                            <button onclick="useTenant('${t.email}', '${t.national_id}')">Use This Tenant</button>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('tenants').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function useTenant(email, nationalId) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = nationalId;
        }
        
        function goToDashboard() {
            window.location.href = 'http://localhost:5176/dashboard';
        }
        
        // Auto-check tenants on load
        window.onload = checkTenants;
    </script>
</body>
</html>
