<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testHouses()">Test Houses API</button>
    <button onclick="testVacantHouses()">Test Vacant Houses API</button>
    <div id="result"></div>

    <script>
        async function testHouses() {
            try {
                console.log('Testing all houses...');
                const response = await fetch('http://localhost:5000/api/houses');
                const data = await response.json();
                document.getElementById('result').innerHTML = `<div class="success">✅ All Houses: ${data.length} houses</div>`;
                console.log('All houses:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }

        async function testVacantHouses() {
            try {
                console.log('Testing vacant houses...');
                const response = await fetch('http://localhost:5000/api/houses?vacant=1');
                const data = await response.json();
                document.getElementById('result').innerHTML = `<div class="success">✅ Vacant Houses: ${data.length} houses</div>`;
                console.log('Vacant houses:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
