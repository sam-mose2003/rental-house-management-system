<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .test-button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .result { margin-top: 15px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Tenant Login Test</h1>
    
    <div class="test-container">
        <h3>Test Tenant Login</h3>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="jane.smith@email.com" placeholder="Enter tenant email">
        </div>
        <div class="form-group">
            <label for="password">Password (National ID):</label>
            <input type="text" id="password" value="23456789" placeholder="Enter national ID">
        </div>
        <button class="test-button" onclick="testLogin()">Test Login</button>
        <button class="test-button" onclick="checkApprovedTenants()">Check Approved Tenants</button>
        <div id="result" class="result">Click to test login...</div>
    </div>
    
    <div class="test-container">
        <h3>Manual Login Form</h3>
        <form onsubmit="manualLogin(event)">
            <div class="form-group">
                <label for="manualEmail">Email:</label>
                <input type="email" id="manualEmail" required>
            </div>
            <div class="form-group">
                <label for="manualPassword">Password (National ID):</label>
                <input type="text" id="manualPassword" required>
            </div>
            <button type="submit" class="test-button">Login</button>
        </form>
        <div id="manualResult" class="result"></div>
    </div>
    
    <div class="test-container">
        <h3>Console Logs</h3>
        <button class="test-button" onclick="clearLogs()">Clear Logs</button>
        <pre id="console-logs">Console logs will appear here...</pre>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
            const logsDiv = document.getElementById('console-logs');
            logsDiv.textContent += logEntry + '\n';
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(logEntry);
        }
        
        function updateResult(elementId, message, type = 'success') {
            const element = document.getElementById(elementId);
            element.className = `result ${type}`;
            element.innerHTML = message;
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            log(`Testing login for: ${email}`);
            updateResult('result', 'Testing login...', 'loading');
            
            try {
                const response = await fetch(`${API_BASE_URL}/tenant-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('Login successful!', 'success');
                    updateResult('result', `
                        <h4>✅ Login Successful!</h4>
                        <p><strong>Name:</strong> ${data.tenant.name}</p>
                        <p><strong>House:</strong> ${data.tenant.house_number}</p>
                        <p><strong>Email:</strong> ${data.tenant.email}</p>
                        <p><strong>Token:</strong> ${data.token.substring(0, 20)}...</p>
                        <p><strong>Status:</strong> ${data.tenant.status}</p>
                        <button onclick="redirectToDashboard()" style="margin-top: 10px;">Go to Dashboard</button>
                    `, 'success');
                    
                    // Store in localStorage for testing
                    localStorage.setItem('tenantInfo', JSON.stringify(data.tenant));
                    localStorage.setItem('tenantToken', data.token);
                } else {
                    log(`Login failed: ${data.error}`, 'error');
                    updateResult('result', `❌ Login Failed: ${data.error}`, 'error');
                }
            } catch (error) {
                log(`Network error: ${error.message}`, 'error');
                updateResult('result', `❌ Network Error: ${error.message}`, 'error');
            }
        }
        
        async function checkApprovedTenants() {
            log('Checking approved tenants...');
            updateResult('result', 'Checking approved tenants...', 'loading');
            
            try {
                const response = await fetch(`${API_BASE_URL}/tenants`);
                const tenants = await response.json();
                
                const approvedTenants = tenants.filter(t => t.status === 'approved');
                
                if (approvedTenants.length > 0) {
                    log(`Found ${approvedTenants.length} approved tenants`, 'success');
                    let html = `<h4>✅ Approved Tenants (${approvedTenants.length}):</h4>`;
                    approvedTenants.forEach(tenant => {
                        html += `
                            <div style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                                <p><strong>Name:</strong> ${tenant.name}</p>
                                <p><strong>Email:</strong> ${tenant.email}</p>
                                <p><strong>House:</strong> ${tenant.house_number}</p>
                                <p><strong>National ID:</strong> ${tenant.national_id}</p>
                                <p><strong>Phone:</strong> ${tenant.phone}</p>
                                <button onclick="fillLogin('${tenant.email}', '${tenant.national_id}')" style="margin-top: 5px;">Use This Tenant</button>
                            </div>
                        `;
                    });
                    updateResult('result', html, 'success');
                } else {
                    log('No approved tenants found', 'error');
                    updateResult('result', '❌ No approved tenants found. Please approve a tenant first.', 'error');
                }
            } catch (error) {
                log(`Error checking tenants: ${error.message}`, 'error');
                updateResult('result', `❌ Error: ${error.message}`, 'error');
            }
        }
        
        function fillLogin(email, nationalId) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = nationalId;
            log(`Filled login form for: ${email}`);
        }
        
        async function manualLogin(event) {
            event.preventDefault();
            const email = document.getElementById('manualEmail').value;
            const password = document.getElementById('manualPassword').value;
            
            log(`Manual login attempt: ${email}`);
            updateResult('manualResult', 'Attempting login...', 'loading');
            
            try {
                const response = await fetch(`${API_BASE_URL}/tenant-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('Manual login successful!', 'success');
                    updateResult('manualResult', `
                        <h4>✅ Login Successful!</h4>
                        <p>Welcome, ${data.tenant.name}!</p>
                        <button onclick="redirectToDashboard()">Go to Dashboard</button>
                    `, 'success');
                    
                    localStorage.setItem('tenantInfo', JSON.stringify(data.tenant));
                    localStorage.setItem('tenantToken', data.token);
                } else {
                    log(`Manual login failed: ${data.error}`, 'error');
                    updateResult('manualResult', `❌ Login Failed: ${data.error}`, 'error');
                }
            } catch (error) {
                log(`Manual login error: ${error.message}`, 'error');
                updateResult('manualResult', `❌ Error: ${error.message}`, 'error');
            }
        }
        
        function redirectToDashboard() {
            window.location.href = 'http://localhost:5176/dashboard';
        }
        
        function clearLogs() {
            document.getElementById('console-logs').textContent = 'Console logs cleared...\n';
        }
        
        // Auto-check approved tenants on page load
        window.onload = function() {
            log('Tenant login test page loaded');
            setTimeout(() => {
                checkApprovedTenants();
            }, 1000);
        };
    </script>
</body>
</html>
