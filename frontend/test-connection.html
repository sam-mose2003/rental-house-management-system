<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    <button onclick="testConnection()">Test API Connection</button>
    <button onclick="testHouses()">Test Houses API</button>
    <div id="results"></div>

    <script>
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">Testing connection...</div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/houses');
                const data = await response.json();
                resultsDiv.innerHTML = `<div class="success">✅ Connection successful! Found ${data.length} houses</div>`;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Connection failed: ${error.message}</div>`;
            }
        }

        async function testHouses() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">Testing vacant houses...</div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/houses?vacant=1');
                const data = await response.json();
                resultsDiv.innerHTML = `<div class="success">✅ Found ${data.length} vacant houses</div>`;
                data.slice(0, 5).forEach(house => {
                    resultsDiv.innerHTML += `<div class="success">- ${house.house_number}: ${house.status}</div>`;
                });
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Failed: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
