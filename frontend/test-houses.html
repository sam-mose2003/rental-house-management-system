<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Houses API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .house-list { margin-top: 10px; }
        .house-item { background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Test Houses API</h1>
    
    <div class="test-section">
        <h3>Test API Connection</h3>
        <button onclick="testAllHouses()">Test All Houses</button>
        <button onclick="testVacantHouses()">Test Vacant Houses</button>
        <div id="result" class="result">Click buttons to test...</div>
    </div>
    
    <div class="test-section">
        <h3>Houses Data</h3>
        <div id="housesList" class="house-list">Click test buttons to load houses...</div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        
        async function testAllHouses() {
            const resultDiv = document.getElementById('result');
            const housesDiv = document.getElementById('housesList');
            
            resultDiv.innerHTML = 'Testing all houses API...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/houses`);
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('All houses data:', data);
                    
                    resultDiv.innerHTML = `<div class="success">✅ Success: Found ${data.length} houses</div>`;
                    housesDiv.innerHTML = data.map(house => 
                        `<div class="house-item">🏠 ${house.house_number} - ${house.status}</div>`
                    ).join('');
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${errorData.error || 'HTTP ' + response.status}</div>`;
                }
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }
        
        async function testVacantHouses() {
            const resultDiv = document.getElementById('result');
            const housesDiv = document.getElementById('housesList');
            
            resultDiv.innerHTML = 'Testing vacant houses API...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/houses?vacant=1`);
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Vacant houses data:', data);
                    
                    resultDiv.innerHTML = `<div class="success">✅ Success: Found ${data.length} vacant houses</div>`;
                    housesDiv.innerHTML = data.map(house => 
                        `<div class="house-item">🏠 ${house.house_number} - ${house.status}</div>`
                    ).join('');
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${errorData.error || 'HTTP ' + response.status}</div>`;
                }
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }
        
        // Auto-test on page load
        window.onload = function() {
            setTimeout(() => {
                testVacantHouses();
            }, 1000);
        };
    </script>
</body>
</html>
