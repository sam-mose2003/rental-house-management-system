<!DOCTYPE html>
<html>
<head>
    <title>Test Houses API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { background: white; padding: 20px; border-radius: 8px; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { background: #d4edda; color: green; }
        .error { background: #f8d7da; color: red; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Test Houses API</h1>
    
    <div class="test">
        <h3>Test All Houses</h3>
        <button onclick="testAllHouses()">Test All Houses API</button>
        <div id="allHousesResult"></div>
    </div>
    
    <div class="test">
        <h3>Test Vacant Houses</h3>
        <button onclick="testVacantHouses()">Test Vacant Houses API</button>
        <div id="vacantHousesResult"></div>
    </div>
    
    <div class="test">
        <h3>Test Backend Connection</h3>
        <button onclick="testBackend()">Test Backend Health</button>
        <div id="backendResult"></div>
    </div>

    <script>
        async function testAllHouses() {
            try {
                const response = await fetch('http://localhost:5000/api/houses');
                const data = await response.json();
                const resultDiv = document.getElementById('allHousesResult');
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h4>✅ All Houses API Working!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Total Houses:</strong> ${data.length}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h4>❌ API Error</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${data.error || 'Unknown error'}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('allHousesResult').innerHTML = 
                    `<h4>❌ Network Error</h4><p>${error.message}</p>`;
            }
        }
        
        async function testVacantHouses() {
            try {
                const response = await fetch('http://localhost:5000/api/houses?vacant=1');
                const data = await response.json();
                const resultDiv = document.getElementById('vacantHousesResult');
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h4>✅ Vacant Houses API Working!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Vacant Houses:</strong> ${data.length}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h4>❌ API Error</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${data.error || 'Unknown error'}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('vacantHousesResult').innerHTML = 
                    `<h4>❌ Network Error</h4><p>${error.message}</p>`;
            }
        }
        
        async function testBackend() {
            try {
                const response = await fetch('http://localhost:5000/');
                const text = await response.text();
                const resultDiv = document.getElementById('backendResult');
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h4>✅ Backend Responding!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Content Length:</strong> ${text.length} characters</p>
                        <p><strong>First 200 chars:</strong> ${text.substring(0, 200)}...</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h4>❌ Backend Error</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('backendResult').innerHTML = 
                    `<h4>❌ Backend Connection Error</h4><p>${error.message}</p>`;
            }
        }
        
        // Auto-test on page load
        window.onload = function() {
            testBackend();
        };
    </script>
</body>
</html>
