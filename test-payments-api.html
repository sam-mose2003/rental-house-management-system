<!DOCTYPE html>
<html>
<head>
    <title>Test Payments API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { background: white; padding: 20px; border-radius: 8px; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { background: #d4edda; color: green; }
        .error { background: #f8d7da; color: red; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Payments API Test</h1>
    
    <div class="test">
        <h3>Test Payments Page</h3>
        <button onclick="testPaymentsPage()">Load Payments Page</button>
        <div id="paymentsResult"></div>
    </div>
    
    <div class="test">
        <h3>Test Tenant Dropdown API</h3>
        <button onclick="testTenantsAPI()">Get Approved Tenants</button>
        <div id="tenantsResult"></div>
    </div>
    
    <div class="test">
        <h3>Direct API Test</h3>
        <button onclick="testDirectAPI()">Test Direct API Call</button>
        <div id="directResult"></div>
    </div>

    <script>
        async function testPaymentsPage() {
            try {
                const response = await fetch('http://localhost:5000/payments');
                const text = await response.text();
                document.getElementById('paymentsResult').innerHTML = 
                    `<h4>Payments Page Response:</h4><pre>${text.substring(0, 500)}...</pre>`;
            } catch (error) {
                document.getElementById('paymentsResult').innerHTML = 
                    `<h4>Error:</h4><p style="color: red;">${error.message}</p>`;
            }
        }
        
        async function testTenantsAPI() {
            try {
                const response = await fetch('http://localhost:5000/api/tenants');
                const data = await response.json();
                const approved = data.filter(t => t.status === 'approved');
                document.getElementById('tenantsResult').innerHTML = 
                    `<h4>Approved Tenants (${approved.length}):</h4><pre>${JSON.stringify(approved, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('tenantsResult').innerHTML = 
                    `<h4>Error:</h4><p style="color: red;">${error.message}</p>`;
            }
        }
        
        async function testDirectAPI() {
            try {
                const response = await fetch('http://localhost:5000/add_payment');
                const text = await response.text();
                document.getElementById('directResult').innerHTML = 
                    `<h4>Add Payment Page Response:</h4><pre>${text.substring(0, 500)}...</pre>`;
            } catch (error) {
                document.getElementById('directResult').innerHTML = 
                    `<h4>Error:</h4><p style="color: red;">${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
