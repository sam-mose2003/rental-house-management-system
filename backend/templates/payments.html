<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sidebar">
  <h2>RHMS</h2>
  <a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i> Dashboard</a>
  <a href="{{ url_for('add_tenant') }}"><i class="fa fa-user-plus"></i> Add Tenant</a>
  <a href="{{ url_for('tenants') }}"><i class="fa fa-users"></i> View Tenants</a>
  <a href="{{ url_for('houses') }}"><i class="fa fa-building"></i> Houses</a>
  <a href="{{ url_for('payments') }}"><i class="fa fa-money-bill"></i> Payments</a>
  <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i> Reports</a>
  <a href="{{ url_for('maintenance') }}"><i class="fa fa-tools"></i> Maintenance</a>
  <a href="{{ url_for('logout') }}" style="margin-top:20px;border-top:1px solid #444;"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
  <div class="header">
    <h2>Rent Payments</h2>
    <a href="{{ url_for('add_payment') }}" style="float:right;padding:8px 16px;background:#2c3e50;color:white;text-decoration:none;border-radius:5px;">Add Payment</a>
  </div>

  <table>
    <tr>
      <th>ID</th>
      <th>Tenant ID</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Method</th>
    </tr>
    {% for p in payments or [] %}
    <tr>
      <td>{{ p[0] }}</td>
      <td>{{ p[1] }}</td>
      <td>{{ p[2] }}</td>
      <td>{{ p[3] }}</td>
      <td>{{ p[4] if p|length > 4 else '-' }}</td>
    </tr>
    {% endfor %}
  </table>
</div>

</body>
</html>
