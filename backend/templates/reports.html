<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Reports</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .report-box { max-width:900px; }
    select, button { padding:10px; border-radius:5px; border:1px solid #ccc; margin-right:10px; }
    button { background:#2c3e50; color:white; border:none; cursor:pointer; }
    .chart-placeholder { height:300px; background:#e1e5ee; display:flex; justify-content:center; align-items:center; border-radius:8px; margin-top:15px; font-weight:bold; color:#333; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>RHMS</h2>
  <a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i> Dashboard</a>
  <a href="{{ url_for('add_tenant') }}"><i class="fa fa-user-plus"></i> Add Tenant</a>
  <a href="{{ url_for('tenants') }}"><i class="fa fa-users"></i> View Tenants</a>
  <a href="{{ url_for('houses') }}"><i class="fa fa-building"></i> Houses</a>
  <a href="{{ url_for('payments') }}"><i class="fa fa-money-bill"></i> Payments</a>
  <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i> Reports</a>
  <a href="{{ url_for('maintenance') }}"><i class="fa fa-tools"></i> Maintenance</a>
  <a href="{{ url_for('logout') }}" class="logout-btn"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
  <div class="header"><h2>View Reports</h2></div>
  <div class="report-box">
    <select>
      <option value="rent">Rent Collection</option>
      <option value="occupancy">Occupancy</option>
      <option value="outstanding">Outstanding Rent</option>
    </select>
    <button type="button">Generate Report</button>
    <div class="chart-placeholder">Chart / Table Placeholder</div>
  </div>
</div>

</body>
</html>
