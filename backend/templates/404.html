<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - RHMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }
        .error-message {
            color: #666;
            margin-bottom: 2rem;
            max-width: 500px;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>RHMS</h2>
        <a href="{{ url_for('home') }}"><i class="fa fa-home"></i> Home</a>
        <a href="{{ url_for('dashboard') }}"><i class="fa fa-tachometer-alt"></i> Dashboard</a>
        <a href="{{ url_for('tenants') }}"><i class="fa fa-users"></i> Tenants</a>
        <a href="{{ url_for('houses') }}"><i class="fa fa-building"></i> Houses</a>
        <a href="{{ url_for('payments') }}"><i class="fa fa-money-bill"></i> Payments</a>
        <a href="{{ url_for('maintenance') }}"><i class="fa fa-tools"></i> Maintenance</a>
        <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i> Reports</a>
    </div>

    <div class="main">
        <div class="error-container">
            <div class="error-icon">🔍</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Oops! The page you're looking for doesn't exist or has been moved. 
                Don't worry, let's get you back on track.
            </p>
            <div class="error-actions">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                    <i class="fa fa-tachometer-alt"></i> Go to Dashboard
                </a>
                <a href="{{ url_for('home') }}" class="btn btn-secondary">
                    <i class="fa fa-home"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
