<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHMS Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Blurred building-style background */
      background: linear-gradient(135deg, #5b7c9a 0%, #3d5a73 40%, #2d4a5e 100%);
      background-image: 
        linear-gradient(135deg, rgba(91, 124, 154, 0.85) 0%, rgba(45, 74, 94, 0.9) 100%),
        url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1920&q=80");
      background-size: cover;
      background-position: center;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .login-card h2 {
      margin: 0 0 32px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #2c3e50;
      text-align: center;
      line-height: 1.35;
    }
    .login-error {
      background: rgba(220, 53, 69, 0.15);
      color: #721c24;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      border: 1px solid rgba(220, 53, 69, 0.3);
    }
    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #5b7c9a;
      font-size: 1.1rem;
      pointer-events: none;
    }
    .login-card input[type="text"],
    .login-card input[type="password"] {
      width: 100%;
      padding: 14px 14px 14px 48px;
      font-size: 1rem;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      color: #2c3e50;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .login-card input::placeholder {
      color: #6b7c8d;
    }
    .login-card input:focus {
      background: rgba(255, 255, 255, 0.95);
      border-color: #3d5a73;
    }
    .login-card button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #2d4a5e;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(45, 74, 94, 0.45);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .login-card button[type="submit"]:hover {
      background: #1e3a4a;
      box-shadow: 0 6px 24px rgba(45, 74, 94, 0.5);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <h2>Rental House Management System</h2>
      {% if error %}
      <p class="login-error">{{ error }}</p>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" name="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

</body>
</html>
