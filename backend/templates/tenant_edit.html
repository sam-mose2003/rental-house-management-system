<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Tenant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .container { max-width:900px; }
    form { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:20px; }
    form input, form select, form button { padding:10px; border-radius:5px; border:1px solid #ccc; }
    form button { background:#2c3e50; color:white; border:none; cursor:pointer; }
    .btn-secondary { background:#64748b; color:white; text-decoration:none; display:inline-block; padding:10px; border-radius:5px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>RHMS</h2>
  <a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i> Dashboard</a>
  <a href="{{ url_for('add_tenant') }}"><i class="fa fa-user-plus"></i> Add Tenant</a>
  <a href="{{ url_for('tenants') }}"><i class="fa fa-users"></i> View Tenants</a>
  <a href="{{ url_for('houses') }}"><i class="fa fa-building"></i> Houses</a>
  <a href="{{ url_for('payments') }}"><i class="fa fa-money-bill"></i> Payments</a>
  <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i> Reports</a>
  <a href="{{ url_for('maintenance') }}"><i class="fa fa-tools"></i> Maintenance</a>
  <a href="{{ url_for('logout') }}" class="logout-btn"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
  <div class="header"><h2>Edit Tenant #{{ tenant[0] }}</h2></div>

  {% if error %}
    <div style="margin: 10px 0; padding: 10px; border: 1px solid #fca5a5; background: #fee2e2; color:#991b1b; border-radius: 8px;">
      {{ error }}
    </div>
  {% endif %}

  <form method="POST" action="{{ url_for('edit_tenant', tenant_id=tenant[0]) }}">
    <input type="text" name="name" placeholder="Name" required value="{{ request.form.get('name', tenant[1]) }}">
    <input type="text" name="national_id" placeholder="National ID" required value="{{ request.form.get('national_id', tenant[2]) }}">
    <input type="text" name="phone" placeholder="Phone" required value="{{ request.form.get('phone', tenant[3]) }}">
    <input type="email" name="email" placeholder="Email" required value="{{ request.form.get('email', tenant[4]) }}">

    {% set current_house = request.form.get('house_number', tenant[5]) %}
    <select name="house_number" required>
      {% for h in houses or [] %}
        {% set hn = h[0] %}
        <option value="{{ hn }}" {{ 'selected' if current_house == hn else '' }}>{{ hn }}</option>
      {% endfor %}
    </select>

    <input type="date" name="move_in_date" required value="{{ request.form.get('move_in_date', tenant[6]) }}">

    <button type="submit">Save Changes</button>
    <a class="btn-secondary" href="{{ url_for('tenants') }}">Cancel</a>
  </form>
</div>

</body>
</html>
