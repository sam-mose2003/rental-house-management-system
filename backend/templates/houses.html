<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Houses</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .container { max-width:900px; }
    .status-vacant { color:green; font-weight:bold; }
    .status-occupied { color:red; font-weight:bold; }
    form { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:20px; }
    form input, form select, form button { padding:10px; border-radius:5px; border:1px solid #ccc; }
    form button { background:#2c3e50; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>RHMS</h2>
  <a href="{{ url_for('dashboard') }}"><i class="fa fa-home"></i> Dashboard</a>
  <a href="{{ url_for('add_tenant') }}"><i class="fa fa-user-plus"></i> Add Tenant</a>
  <a href="{{ url_for('tenants') }}"><i class="fa fa-users"></i> View Tenants</a>
  <a href="{{ url_for('houses') }}"><i class="fa fa-building"></i> Houses</a>
  <a href="{{ url_for('payments') }}"><i class="fa fa-money-bill"></i> Payments</a>
  <a href="{{ url_for('reports') }}"><i class="fa fa-chart-bar"></i> Reports</a>
  <a href="{{ url_for('maintenance') }}"><i class="fa fa-tools"></i> Maintenance</a>
  <a href="{{ url_for('logout') }}" class="logout-btn"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
  <div class="header"><h2>Manage Houses</h2></div>

  <form method="POST" action="{{ url_for('houses') }}">
    <input type="text" name="house_number" placeholder="House Number" required>
    <select name="status">
      <option value="Vacant">Vacant</option>
      <option value="Occupied">Occupied</option>
    </select>
    <button type="submit">Add House</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>House Number</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for h in houses or [] %}
      <tr>
        <td>{{ h[1] if h|length >= 3 else h[0] }}</td>
        <td class="status-{{ (h[2] if h|length >= 3 else h[1])|lower }}">{{ h[2] if h|length >= 3 else h[1] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
